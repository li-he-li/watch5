name: Multi-Platform Build

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  shared-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared tests
        run: ./gradlew :shared:testDebugUnitTest --no-daemon --stacktrace

  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Wear and Phone APKs
        run: ./gradlew :wear-app:assembleDebug :phone-app:assembleDebug --no-daemon --stacktrace

      - name: Upload Wear APK
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-debug-apk
          path: wear-app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Phone APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-app-debug-apk
          path: phone-app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  desktop-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build desktop distributions
        run: ./gradlew :desktop-app:createDistributable --no-daemon --stacktrace

      - name: Upload desktop distributable app directory
        uses: actions/upload-artifact@v4
        with:
          name: desktop-distributable-app
          path: desktop-app/build/compose/binaries/main/app/**
          if-no-files-found: error

      - name: Upload desktop native packages
        uses: actions/upload-artifact@v4
        with:
          name: desktop-native-packages
          path: desktop-app/build/compose/binaries/main/**
          if-no-files-found: warn
